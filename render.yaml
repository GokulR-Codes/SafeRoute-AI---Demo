# Render Blueprint for the SafeRoute-AI backend.
# Deploy via Render Dashboard -> "New +" -> "Blueprint" and point it at this repo.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: saferoute-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore # closest to a Bengaluru dataset; change if you prefer
    healthCheckPath: /api/status
    envVars:
      - key: SAFEROUTE_OUTPUT_DIR
        value: /tmp/routes
